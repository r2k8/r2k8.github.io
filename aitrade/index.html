<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-emoji">⚡️</span>
                <h1>Autonomous <span>Trading Core</span></h1>
            </div>
            <div class="status-badge">
                <div class="pulse-dot"></div>
                System Active
            </div>
        </header>

        <main>
            <div class="pipeline">
                
                <!-- Layer 1 -->
                <div class="stage">
                    <div class="stage-icon">L1</div>
                    <div class="glass-card layer-card">
                        <div class="card-header">Macro & Capital Flows</div>
                        <div class="card-body">
                            <!-- Regime -->
                            <div class="metric-large" id="regime-text" style="margin-bottom: 2rem;">Loading Regime...</div>
                            
                            <!-- Capital Flow Sankey -->
                            <div class="flow-section">
                                <div class="flow-header">Global Capital Flow Sankey</div>
                                <div id="capital-flow-container" style="width: 100%; height: 400px; margin-top: 1rem;">
                                    <div class="loader"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="connector"></div>

                <!-- Layer 3 / Target -->
                <div class="stage">
                    <div class="stage-icon">L3</div>
                    <div class="glass-card highlight-card">
                        <div class="card-header">Actionable Target</div>
                        <div class="card-body" id="target-body">
                            <div class="loader"></div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Logs -->
            <div class="logs-container">
                <div class="glass-card terminal">
                    <div class="terminal-bar">
                        <span class="mac-dot close"></span>
                        <span class="mac-dot min"></span>
                        <span class="mac-dot max"></span>
                        <span class="terminal-title">cron_output.log</span>
                    </div>
                    <pre id="cron-logs">Initializing telemetry...</pre>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js?v=2"></script>
</body>
</html>
