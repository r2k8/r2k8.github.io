<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Trading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <h1>AI Trading <span>Hub</span></h1>
            </div>
            <div class="status-indicator">
                <div class="dot pulse"></div>
                <span>System Active</span>
            </div>
        </header>

        <main>
            <section class="top-row">
                <div class="card glass">
                    <h2>Market Regime</h2>
                    <div id="regime-display" class="metric-value">Loading...</div>
                    <div class="metric-label">Layer 1 Macro Analysis</div>
                </div>
                <div class="card glass">
                    <h2>Bull/Bear Score</h2>
                    <div class="score-bar">
                        <div id="bull-fill" class="fill bull"></div>
                        <div id="bear-fill" class="fill bear"></div>
                    </div>
                    <div class="metric-label" id="score-text">Calculating...</div>
                </div>
            </section>

            <section class="main-row">
                <div class="card glass primary-action">
                    <h2>Today's Trade Target</h2>
                    <div class="target-container" id="target-container">
                        <div class="loader"></div>
                    </div>
                </div>

                <div class="card glass log-terminal">
                    <h2>System Logs</h2>
                    <pre id="cron-logs">Loading logs...</pre>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
