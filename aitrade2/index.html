<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Hub | STAGING Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .prototype-banner {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            text-align: center;
            padding: 0.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(245, 158, 11, 0.4);
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .crumb-link {
            cursor: pointer;
            color: var(--accent);
            font-weight: 500;
            transition: color 0.2s;
        }
        .crumb-link:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="prototype-banner">Staging Environment - Drill-Down Sankey Prototype</div>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-emoji">🧪</span>
                <h1>Autonomous <span>Staging Core</span></h1>
            </div>
            <div class="status-badge" style="color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); background: rgba(245, 158, 11, 0.1);">
                <div class="pulse-dot" style="background: #f59e0b; box-shadow: none; animation: none;"></div>
                Prototype Mode
            </div>
        </header>

        <main>
            <div class="pipeline">
                <div class="stage" style="width: 100%;">
                    <div class="glass-card layer-card" style="width: 100%;">
                        <div class="card-header">Interactive Global Capital Flows</div>
                        <div class="card-body">
                            
                            <div class="breadcrumb" id="breadcrumbs">
                                <!-- Breadcrumbs will be injected here -->
                            </div>

                            <!-- Capital Flow Sankey -->
                            <div class="flow-section">
                                <div id="sankey-prototype" style="width: 100%; height: 500px;">
                                    <div class="loader"></div>
                                </div>
                            </div>
                            <p style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted); text-align: center;">
                                💡 Click on a target node (e.g. 'US Equities' or 'Tech Sector') to drill down into its sub-components!
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js?v=2"></script>
</body>
</html>
